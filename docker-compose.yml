services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osint_app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-leakosint_db}
      DB_USERNAME: ${DB_USERNAME:-osint_user}
      DB_PASSWORD: ${DB_PASSWORD}
      LEAKOSINT_API_TOKEN: ${LEAKOSINT_API_TOKEN}
      SESSION_DRIVER: file
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - osint_network

  db:
    image: mariadb:11.8
    container_name: osint_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-leakosint_db}
      MYSQL_USER: ${DB_USERNAME:-osint_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osint_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: osint_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - osint_network

volumes:
  db_data:
  app_storage:
  app_bootstrap:

networks:
  osint_network:
    driver: bridge
